{% extends 'mattel/base.html' %}
{% load static %}
{% block app_title %}Inicio{% endblock %}
{% block app_content %}

<style>
    .alert {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        min-width: 300px;
        max-width: 600px;
        padding: 15px 20px;
        border-radius: 8px;
        font-size: 16px;
        animation: slideDown 0.5s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    }

    .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }
</style>

<!-- Mostrar mensajes -->
{% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}

<div style="margin: 0; padding: 0; width: 100%;">

  <div class="text-white"
       style="background-image: url('{% static 'mattel/img/fondoc.jpg' %}');
              background-size: cover;
              background-position: center;
              background-repeat: no-repeat;
              height: 100vh;
              width: 100vw;
              position: relative;
              left: 50%;
              right: 50%;
              margin-left: -50vw;
              margin-right: -50vw;
              overflow: hidden;">

   
    <div style="position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.35);">
    </div>

    <div style="position: relative;
                z-index: 2;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                text-align: center;
                padding-top: 20px;
                padding-bottom: 20px;">
      <h1 class="display-4 fw-bold mb-2">Sabores que inspiran, recetas que conquistan.</h1>
      <p class="lead fw-bold mb-3">descubre, cocina y disfruta.</p>
    
    </div>

  </div>
</div>

<script>
    // Auto-ocultar mensajes después de 6 segundos
    document.addEventListener('DOMContentLoaded', function() {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            setTimeout(() => {
                alert.style.transition = 'opacity 0.5s ease';
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 500);
            }, 6000);
        });
    });
</script>

{% endblock %}
